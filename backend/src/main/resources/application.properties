server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/zampacasa_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# aggiorna lo schema del database all'avvio dell'applicazione, se necessario
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

app.default-user.enabled=${APP_DEFAULT_USER_ENABLED:true}
app.default-user.email=${APP_DEFAULT_USER_EMAIL:demo@demo.it}
app.default-user.password=${APP_DEFAULT_USER_PASSWORD:password123}
